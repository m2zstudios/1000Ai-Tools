name = "m2zpicks-cache-bridge"
main = "src/index.js"
compatibility_date = "2026-05-03"

[[kv_namespaces]]
binding = "TOOLS_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_NAMESPACE_ID"

[triggers]
crons = ["0 0 */3 * *"]

[vars]
APPWRITE_ENDPOINT = "https://sfo.cloud.appwrite.io/v1"
APPWRITE_PROJECT_ID = "m2zpicks"
APPWRITE_DATABASE_ID = "m2zpicks-db"
APPWRITE_TOOLS_COLLECTION_ID = "tools"
CACHE_TTL_SECONDS = "259200"
