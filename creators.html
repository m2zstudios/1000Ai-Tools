<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Creator Picks | m2zpicks</title><link rel="stylesheet" href="style.css"/><link rel="icon" href="/favicon.ico" type="image/x-icon"><meta name="google-adsense-account" content="ca-pub-6875637223271831"></head><body><div class="scroll-progress" id="scrollProgress"></div><header class="site-header"><div class="container nav-wrap"><a href="index.html" class="logo"><span class="logo-mark">✦</span><span class="logo-text">m2zpicks</span></a><nav class="main-nav" id="mainNav"><a href="index.html">Home</a><a href="list.html">Browse Tools</a><a href="rankings.html">AI Rankings</a><a href="creators.html" class="active">Creator Picks</a></nav><div class="nav-actions"><button class="theme-toggle" id="themeToggle">🌙</button></div></div></header><main class="container section"><section><h1 class="gradient-text">What Creators Pick 🎬</h1><p>Curated AI tool picks from top YouTubers, streamers & tech creators</p></section><div id="creatorRoot"></div></main><footer class="site-footer"><div class="container footer-wrap"><p>© <span id="year"></span> m2zpicks</p></div></footer><script src="https://cdn.jsdelivr.net/npm/appwrite@16/dist/iife/sdk.js"></script><script src="appwrite.js"></script><script src="script.js?v=20260502"></script><script src="gift.js?v=20260314"></script><script>(async()=>{const root=document.getElementById('creatorRoot');const creators=await window.AppwriteLayer.fetchAllCreators();const tools=await window.AppwriteLayer.fetchAllTools();const byId=new Map(tools.map(t=>[Number(t.id),t]));const slug=new URLSearchParams(location.search).get('slug');if(!slug){root.innerHTML=`<div class='creator-grid'>${creators.map(c=>`<article class='creator-card'><img src='${c.avatar_url}' class='creator-avatar'><h3>${c.name}</h3><p>${c.handle} · ${c.platform}</p><p>${c.bio||''}</p><p>${(c.pick_ids||[]).length} tools picked</p><a class='btn btn-secondary' href='creators.html?slug=${c.slug}'>View Picks →</a></article>`).join('')}</div>`;return;}const c=creators.find(x=>x.slug===slug);if(!c){root.innerHTML='<div class="empty-state"><h2>Creator not found</h2></div>';return;}const picks=(c.pick_ids||[]).map(id=>byId.get(Number(id))).filter(Boolean);root.innerHTML=`<a href='creators.html' class='text-link'>← All Creators</a><div class='creator-detail-head'><img src='${c.avatar_url}' class='creator-avatar-lg'><h2>${c.name}</h2><p>${c.bio||''}</p><a href='${c.channel_url}' target='_blank' class='text-link'>Visit channel →</a></div><h3>${c.name}'s AI Tool Picks</h3><div class='grid'>${picks.map(t=>`<article class='tool-card'><h3>${t.title}</h3><p>${t.description||''}</p><div class='creator-pick-badge'>⭐ Creator Pick</div><a class='btn btn-secondary' href='detailed.html?id=${t.id}'>View Details</a></article>`).join('')}</div>`;})();</script></body></html>
