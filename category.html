  <style>
    :root {
      --bg:        #0a0a0f;
      --bg-card:   #111118;
      --bg-hover:  #16161f;
      --border:    rgba(255,255,255,0.07);
      --border-hi: rgba(255,255,255,0.14);
      --text:      #e8e8f0;
      --muted:     #8888a8;
      --accent:    #7c5cfc;
      --accent-2:  #00d4aa;
      --accent-glow: rgba(124,92,252,0.25);
      --radius:    14px;
      --radius-lg: 22px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    .scroll-progress { position: fixed; top: 0; left: 0; height: 2px; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); z-index: 9999; transition: width 0.1s linear; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* Header */
    .site-header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,15,0.85); backdrop-filter: blur(16px) saturate(180%); border-bottom: 1px solid var(--border); }
    .nav-wrap { display: flex; align-items: center; gap: 32px; height: 64px; }
    .logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-head); font-weight: 800; font-size: 18px; letter-spacing: -0.3px; }
    .logo-mark { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius: 8px; display: grid; place-items: center; font-size: 14px; color: #fff; }
    .main-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .main-nav a { padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--muted); transition: color var(--transition), background var(--transition); }
    .main-nav a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .nav-actions { display: flex; align-items: center; gap: 10px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; font-family: var(--font-body); cursor: pointer; border: none; transition: all var(--transition); }
    .btn-nav { background: rgba(124,92,252,0.15); color: #a78bfa; border: 1px solid rgba(124,92,252,0.3); }
    .btn-nav:hover { background: rgba(124,92,252,0.25); border-color: rgba(124,92,252,0.5); }
    .theme-toggle, .menu-toggle { width: 36px; height: 36px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 15px; display: grid; place-items: center; color: var(--text); transition: background var(--transition); }
    .theme-toggle:hover, .menu-toggle:hover { background: rgba(255,255,255,0.1); }
    .menu-toggle { display: none; }

    /* Category Page Header */
    .list-header {
      padding: 48px 0 36px;
      position: relative;
    }
    .list-header::before {
      content: '';
      position: absolute;
      top: -20px; left: -60px;
      width: 400px; height: 280px;
      background: radial-gradient(ellipse, rgba(124,92,252,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .list-header h1 {
      font-family: var(--font-head);
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -1.5px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .muted { font-size: 14px; color: var(--muted); font-weight: 400; }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted); font-weight: 500;
      margin-bottom: 24px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      transition: all var(--transition);
    }
    .back-link:hover { color: var(--text); border-color: var(--border-hi); }

    /* Filters */
    .filters {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 28px;
    }
    .filters label { display: flex; align-items: center; }
    .filters input[type="search"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      min-width: 240px;
      transition: border-color var(--transition);
      outline: none;
    }
    .filters input[type="search"]::placeholder { color: var(--muted); }
    .filters input[type="search"]:focus { border-color: rgba(124,92,252,0.5); }
    .filters select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .filters select:focus { border-color: rgba(124,92,252,0.4); }
    .favorites-only {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted); font-weight: 500;
      cursor: pointer; user-select: none;
    }
    .favorites-only input { accent-color: var(--accent); cursor: pointer; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .tool-card, .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 22px;
      display: flex; flex-direction: column; gap: 10px;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
      position: relative; overflow: hidden; cursor: pointer;
    }
    .tool-card::before, .card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(124,92,252,0.04), transparent); opacity: 0; transition: opacity var(--transition); pointer-events: none; }
    .tool-card:hover, .card:hover { border-color: rgba(124,92,252,0.4); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,92,252,0.1); }
    .tool-card:hover::before, .card:hover::before { opacity: 1; }
    .tool-card h3, .card h3 { font-family: var(--font-head); font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
    .tool-card p, .card p { font-size: 13px; color: var(--muted); line-height: 1.55; flex: 1; }
    .tag { display: inline-flex; align-items: center; padding: 3px 10px; background: rgba(124,92,252,0.1); border: 1px solid rgba(124,92,252,0.2); border-radius: 100px; font-size: 11px; font-weight: 600; color: #a78bfa; letter-spacing: 0.3px; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 80px 20px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
    }
    .empty-state h2 { font-family: var(--font-head); font-size: 22px; margin-bottom: 10px; color: var(--muted); }
    .empty-state p { font-size: 14px; color: var(--muted); }
    .hidden { display: none !important; }

    /* Infinite loader */
    .infinite-loader {
      text-align: center; padding: 24px;
      color: var(--muted); font-size: 13px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .infinite-loader::before {
      content: '';
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .site-footer { border-top: 1px solid var(--border); padding: 32px 0; margin-top: 80px; }
    .footer-wrap { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .footer-wrap p { font-size: 13px; color: var(--muted); }
    .footer-wrap nav { display: flex; gap: 20px; }
    .footer-wrap nav a { font-size: 13px; color: var(--muted); transition: color var(--transition); }
    .footer-wrap nav a:hover { color: var(--text); }

    main.container { padding-top: 0; }

    @media (max-width: 768px) {
      .main-nav { display: none; }
      .main-nav.open { display: flex; flex-direction: column; position: absolute; top: 64px; left: 0; right: 0; background: rgba(10,10,15,0.98); border-bottom: 1px solid var(--border); padding: 16px; gap: 4px; z-index: 200; }
      .menu-toggle { display: grid; }
      .filters { flex-direction: column; align-items: stretch; }
      .filters input[type="search"] { min-width: unset; width: 100%; }
      .grid { grid-template-columns: 1fr; }
    }

    body.light {
      --bg: #f5f5fa; --bg-card: #ffffff; --bg-hover: #f0f0f8;
      --border: rgba(0,0,0,0.08); --border-hi: rgba(0,0,0,0.15);
      --text: #0f0f18; --muted: #6b6b8a;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .list-header { animation: fadeUp 0.4s ease both; }
    .filters { animation: fadeUp 0.4s 0.1s ease both; }
    .grid { animation: fadeUp 0.4s 0.15s ease both; }
  </style>
</head>
