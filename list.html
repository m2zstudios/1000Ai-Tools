<body data-page="list">
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="logo" aria-label="m2zpicks Home">
        <span class="logo-mark">✦</span>
        <span class="logo-text">m2zpicks</span>
      </a>

      <nav class="main-nav" id="mainNav" aria-label="Main Navigation">
        <a href="index.html">Home</a>
        <a href="list.html" class="active">Browse Tools</a>
      </nav>

      <div class="nav-actions">
        <a href="list.html" class="btn btn-nav">Start Exploring</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
      </div>
    </div>
  </header>

  <main class="container section">
    <section class="section-head list-header">
      <h1>Browse AI Tools</h1>
      <p class="muted" id="resultsCount">Loading tools...</p>
    </section>

    <section class="filters" aria-label="Tool filters">
      <label>
        <span class="sr-only">Search tools by title</span>
        <input id="searchInput" type="search" placeholder="Search by title..." autocomplete="off" />
      </label>
      <label>
        <span class="sr-only">Filter by category</span>
        <select id="categoryFilter">
          <option value="all">All categories</option>
        </select>
      </label>
      <label>
        <span class="sr-only">Sort tools</span>
        <select id="sortFilter">
          <option value="title-asc">Sort: Title A–Z</option>
          <option value="title-desc">Sort: Title Z–A</option>
          <option value="id-asc">Sort: Oldest First</option>
          <option value="id-desc">Sort: Newest First</option>
        </select>
      </label>
      <label class="favorites-only">
        <input id="favoritesOnly" type="checkbox" />
        <span>Favorites only</span>
      </label>
    </section>

    <section>
      <div class="grid" id="toolsGrid" aria-live="polite"></div>
      <div class="empty-state hidden" id="emptyState">
        <h2>No tools found</h2>
        <p>Try changing search terms or choosing a different category.</p>
      </div>
      <div class="load-more-wrap" id="infiniteLoaderWrap">
        <div id="infiniteLoader" class="infinite-loader hidden" aria-live="polite">Loading more tools…</div>
      </div>
      <div id="listSentinel" aria-hidden="true"></div>
    </section>

    <section style="margin: 40px 0;">
      <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6875637223271831"

           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© <span id="year"></span> m2zpicks</p>
      <nav aria-label="Footer links">
        <a href="about.html">About</a>
